name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"
      # npm ci で lockfile 厳密・スクリプト無効（.npmrc ignore-scripts）を担保
      - name: Install
        run: npm ci
      - name: Test
        run: npx vitest run
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npx biome check .
      # prod 依存（hono）を厳格ゲート。dev 依存の脆弱性で CI を落とさないため --omit=dev に限定。
      # 本当の prod 脆弱性が出た時のみ fail させる。
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      # dev 含む全依存は可視化のみ（test toolchain 由来の既知脆弱性は Dependabot で別途追跡）。
      # informational のためブロッキングしない。
      - name: Audit all dependencies (informational)
        run: npm audit --audit-level=high
        continue-on-error: true
