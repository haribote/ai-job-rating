name: e2e

# Playwright E2E（#28）。実ブラウザで主要 UI の SSR 描画・基本操作を検証する。
# vitest（pool-workers）の単体テストと棲み分け、ブラウザ実行が要るためジョブを分離する。
on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"
      # npm ci で lockfile 厳密・スクリプト無効（.npmrc ignore-scripts）を担保。
      - name: Install
        run: npm ci
      # ignore-scripts によりブラウザは postinstall されないため、明示的に install する。
      # --with-deps で CI ランナーに OS 依存も入れる（Playwright 公式の推奨手順）。
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      # webServer（playwright.config.ts）が migrations apply → wrangler dev を前段起動するため、
      # ここでは playwright test を呼ぶだけでよい。
      - name: Run E2E
        run: npx playwright test
      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
